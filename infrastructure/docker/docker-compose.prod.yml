version: '3.9'

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: saas_blog_nginx
    ports:
      - '80:80'
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - admin-dashboard
      - blog-frontend
      - admin-api
    restart: unless-stopped
    networks:
      - saas_network

  admin-api:
    build:
      context: ../../apps/admin-api
      dockerfile: ../../infrastructure/docker/Dockerfile.api
    container_name: saas_blog_api
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: saas_blog
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET: ${JWT_SECRET:?set_in_env}
      JWT_EXPIRES_IN: 15m
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?set_in_env}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN:-example.com}
      LOG_LEVEL: info
      # Email (SMTP)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      MAIL_FROM: ${MAIL_FROM:-}
      # Local media URLs (when using local storage)
      PUBLIC_MEDIA_BASE_URL: ${PUBLIC_MEDIA_BASE_URL:-}
      PUBLIC_SITE_BASE_URL: ${PUBLIC_SITE_BASE_URL:-}
    volumes:
      - api_uploads:/app/uploads
      - api_imports:/app/imports
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started
    restart: unless-stopped
    networks:
      - saas_network

  worker:
    build:
      context: ../../apps/admin-api
      dockerfile: ../../infrastructure/docker/Dockerfile.api
    container_name: saas_blog_worker
    command: node src/jobs/worker.js
    healthcheck:
      disable: true
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      DB_NAME: saas_blog
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?set_in_env}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      MAIL_FROM: ${MAIL_FROM:-}
      PUBLIC_SITE_BASE_URL: ${PUBLIC_SITE_BASE_URL:-}
    volumes:
      - api_uploads:/app/uploads
      - api_imports:/app/imports
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - saas_network

  admin-dashboard:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        APP_PATH: apps/admin-dashboard
    container_name: saas_blog_admin
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://admin-api:3001}
      NEXT_PUBLIC_BLOG_URL: ${NEXT_PUBLIC_BLOG_URL:-http://blog-frontend:3002}
    depends_on:
      - admin-api
    restart: unless-stopped
    networks:
      - saas_network

  blog-frontend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        APP_PATH: apps/blog-frontend
    container_name: saas_blog_frontend
    environment:
      NODE_ENV: production
      PLATFORM_API_URL: ${PLATFORM_API_URL:-http://admin-api:3001}
      PLATFORM_API_TOKEN: ${PLATFORM_API_TOKEN:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?set_in_env}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
      TENANT_DOMAIN: ${TENANT_DOMAIN:-}
    depends_on:
      - admin-api
    restart: unless-stopped
    networks:
      - saas_network

  mysql:
    image: mysql:8.0
    container_name: saas_blog_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: saas_blog
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'root',
          '--password=${DB_ROOT_PASSWORD:-rootpassword}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - saas_network

  redis:
    image: redis:7-alpine
    container_name: saas_blog_redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - saas_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: saas_blog_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - saas_network

volumes:
  mysql_data:
  redis_data:
  es_data:
  api_uploads:
  api_imports:

networks:
  saas_network:
    driver: bridge

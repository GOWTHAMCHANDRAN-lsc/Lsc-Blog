worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout  65;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  include /etc/nginx/conf.d/*.conf;
}

# /etc/nginx/nginx.conf
# Main Nginx config for SaaS Blog Platform

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'tenant=$http_x_tenant_id';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=30r/m;

    # Upstream: API servers
    upstream admin_api {
        least_conn;
        server api-1:3001 weight=1 max_fails=3 fail_timeout=30s;
        server api-2:3001 weight=1 max_fails=3 fail_timeout=30s;
        server api-3:3001 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Admin API ──────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.yourplatform.com;

        ssl_certificate     /etc/ssl/certs/platform.crt;
        ssl_certificate_key /etc/ssl/private/platform.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /admin/ {
            limit_req zone=admin_limit burst=20 nodelay;
            proxy_pass http://admin_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://admin_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 5m;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /health {
            proxy_pass http://admin_api;
            access_log off;
        }
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Tenant blog sites (wildcard subdomain) ────────────────────────────────
    # Each tenant has their own Next.js frontend running on a separate port/pod
    # This config shows the pattern; in k8s use Ingress with host rules instead
    server {
        listen 443 ssl http2;
        server_name ~^(?P<tenant>[a-z0-9-]+)\.yourplatform\.com$;

        ssl_certificate     /etc/ssl/certs/wildcard.yourplatform.crt;
        ssl_certificate_key /etc/ssl/private/wildcard.yourplatform.key;

        location / {
            # In production, resolve tenant blog frontend from service registry
            # Here we proxy to a generic blog frontend that uses API token for isolation
            proxy_pass http://blog-frontend:3002;
            proxy_set_header Host $host;
            proxy_set_header X-Tenant-Slug $tenant;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache static Next.js assets
            proxy_cache_valid 200 1h;
        }
    }
}
